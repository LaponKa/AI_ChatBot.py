<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <h1>AI Chatbot</h1>
      <p>Made by Viktoriia Mukha</p>
    </header>

    <section id="chat-container">
      <div id="chatbox" aria-live="polite"></div>
    </section>

    <form id="input-form" class="input-area" onsubmit="return false;">
      <input id="message" type="text" placeholder="Type a message and press Enter" autocomplete="off" />
      <button id="sendBtn" type="button">Send</button>
    </form>
  </main>

  <script>
    async function sendMessage() {
      const messageEl = document.getElementById("message");
      const message = messageEl.value.trim();
      if (!message) return;

      const chatbox = document.getElementById("chatbox");
      const addBubble = (text, cls) => {
        const d = document.createElement("div");
        d.className = "message " + cls;
        d.textContent = text;
        chatbox.appendChild(d);
      };

      addBubble("You: " + message, "user");

      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
      });
      const data = await res.json();
      addBubble("Bot: " + (data.response || "No response"), "bot");

      messageEl.value = "";
      messageEl.focus();
      chatbox.scrollTop = chatbox.scrollHeight;
    }

    document.getElementById("sendBtn").addEventListener("click", sendMessage);
    document.getElementById("message").addEventListener("keydown", e => {
      if (e.key === "Enter") {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
